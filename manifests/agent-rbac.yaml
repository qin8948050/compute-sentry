apiVersion: v1
kind: ServiceAccount
metadata:
  name: compute-sentry-agent
  namespace: compute-sentry-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compute-sentry-agent-role
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "patch"] # Added for pod listing and patching health annotations
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compute-sentry-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: compute-sentry-agent-role
subjects:
- kind: ServiceAccount
  name: compute-sentry-agent
  namespace: compute-sentry-system
