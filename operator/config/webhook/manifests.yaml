---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-config-aiguard-io-v1-computesentrypolicy
  failurePolicy: Fail
  name: mcomputesentrypolicy-v1.kb.io
  rules:
  - apiGroups:
    - config.aiguard.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - computesentrypolicies
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-v1-pod
  failurePolicy: Fail
  name: mpod.kf.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pods
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-config-aiguard-io-v1-computesentrypolicy
  failurePolicy: Fail
  name: vcomputesentrypolicy-v1.kb.io
  rules:
  - apiGroups:
    - config.aiguard.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - computesentrypolicies
  sideEffects: None
